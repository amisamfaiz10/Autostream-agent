<!DOCTYPE html>
<html>
<head>
    <title>AutoStream AI</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-wrapper {
            width: 420px;
            height: 650px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .header {
            padding: 18px;
            font-weight: 600;
            font-size: 16px;
            background: rgba(59,130,246,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 12px 14px;
            border-radius: 14px;
            max-width: 75%;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.2s ease-in;
        }

        .user {
            background: #3b82f6;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: rgba(255,255,255,0.1);
            color: #e2e8f0;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            margin-left: 10px;
            padding: 12px 18px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .suggestions {
            padding: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suggestions button {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: #cbd5f5;
            cursor: pointer;
            font-size: 12px;
        }

        .typing {
            font-size: 12px;
            opacity: 0.7;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(5px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="chat-wrapper">

    <div class="header">
        🎬 AutoStream Assistant 
        <span onclick="clearChat()" style="float:right; cursor:pointer;">🗑</span>
    </div>

    <div id="chat-box" class="messages"></div>

    <div class="suggestions">
        <button onclick="quickMsg('What is your pricing?')">Pricing</button>
        <button onclick="quickMsg('Tell me about Pro plan')">Pro Plan</button>
    </div>

    <div class="input-area">
        <input id="message" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

// ✅ Welcome message
window.onload = () => {
    const chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `
        <div class="message bot">
            Hey! I'm your AutoStream assistant.<br><br>
            Ask me about pricing, plans, or getting started.
        </div>
    `;
};

// Quick buttons
function quickMsg(text) {
    document.getElementById("message").value = text;
    sendMessage();
}

// Typing animation
function typeMessage(text) {
    const chatBox = document.getElementById("chat-box");

    const msgDiv = document.createElement("div");
    msgDiv.className = "message bot";
    chatBox.appendChild(msgDiv);

    let i = 0;

    function typing() {
        if (i < text.length) {
            msgDiv.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 15);
        }
    }

    typing();
}

// Send message
async function sendMessage() {
    const input = document.getElementById("message");
    const chatBox = document.getElementById("chat-box");

    const message = input.value.trim();
    if (!message) return;

    // User message
    chatBox.innerHTML += `<div class="message user">${message}</div>`;
    input.value = "";
    input.disabled = true;

    // Typing indicator
    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.innerText = "Typing...";
    chatBox.appendChild(typing);

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        typing.remove();

        typeMessage(data.response);

    } catch (err) {
        typing.remove();
        chatBox.innerHTML += `<div class="message bot">⚠️ Server error</div>`;
    }

    input.disabled = false;
    input.focus();
    chatBox.scrollTop = chatBox.scrollHeight;
}

//  Enter key support
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

// Clear chat
function clearChat() {
    document.getElementById("chat-box").innerHTML = "";
}

</script>

</body>
</html>
